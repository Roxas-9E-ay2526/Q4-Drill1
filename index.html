<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>

    <div class="container header d-flex justify-content-between align-items-center">
        <div class="title">Electricity Consumption Classifier</div>
    
        <div class="box">
            <span class="kwh-label">kWh</span>
            <input type="number" id="kwhInput" class="form-control" placeholder="Input kilowatt per hour">
            <button class="btn btn-warning" onclick="classifyConsumption()">
    Consumption Classification
</button>
        </div>
    </div>

    <div class="container mt-3">
        <p id="errorMsg" class="error"></p>
    </div>

    <script>
        function classifyConsumption() {
            let kwh = document.getElementById("kwhInput").value;
            kwh = Number(kwh);
            if (kwh < 0) {
                document.getElementById("errorMsg").innerHTML = "Please input a non negative number.";
            return;
            } else {
                document.getElementById("errorMsg").innerHTML = "";
            }
            let message = "";

            if (kwh >=0 && kwh <= 100) {
                message = "Lifeline Consumer: Discounted electricity rates.";
            } else if (kwh <= 200) {
                message = " Low Consumption: Normal rediential rate.";
            } else if (kwh <= 300) {
                message = "Average Consumption: Typical electricity usage.";
            } else if (kwh <= 500) {
                message  = "High Consumption: Heavy electricity users.";
            } else {
                message = "Very High Consumption: Heavy electricity users.";
            }

            window.alert(message);
        }
    </script>
</body>
</html>
